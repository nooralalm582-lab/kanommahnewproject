<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول | كان أمة</title>
<meta name="description" content="سجّل دخولك إلى منصة كن أمة لمتابعة برامج تعليم القرآن الكريم.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>
<body>

<a href="#loginForm" class="skip-link">تخطَّ إلى نموذج الدخول</a>

<div class="login-page">
  <div class="login-wrap">

    <a href="index.html" class="login-back"> <img src="Logo.png"> 
    </a>

    <div class="login-card">
      <h2>تسجيل الدخول</h2>
      <p class="login-sub">أهلاً بعودتك، يسعدنا متابعة رحلتك القرآنية معنا</p>

      <form id="loginForm" novalidate>
        <div class="field" id="emailField">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M3 6h18v12H3z" stroke-linejoin="round"/>
            <path d="M3 7l9 7 9-7" stroke-linejoin="round"/>
          </svg>
          <label for="email" class="visually-hidden">البريد الإلكتروني</label>
          <input type="email" id="email" name="email" placeholder="البريد الإلكتروني" autocomplete="email" required>
        </div>
        <p class="field-error" id="emailError"></p>

        <div class="field" id="passwordField">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="5" y="11" width="14" height="9" rx="2"/>
            <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
          </svg>
          <label for="password" class="visually-hidden">كلمة المرور</label>
          <input type="password" id="password" name="password" placeholder="كلمة المرور" autocomplete="current-password" required minlength="6">
          <button type="button" class="field-toggle" id="togglePassword" aria-label="إظهار كلمة المرور" aria-pressed="false">
            <i class="fa-solid fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        <p class="field-error" id="passwordError"></p>

        <div class="login-meta">
          <label><input type="checkbox" name="remember"> تذكرني</label>
          <a href="#forgot">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="btn-login" onclick="window.location.href='----'">
          تسجيل الدخول
      </button>
        
      </form>

      <p class="login-signup">ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a></p>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<script src="script.js"></script>
</body>
</html>
